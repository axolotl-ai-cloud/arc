name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npx eslint packages/*/src/

      - name: Build TypeScript
        run: npm run build

      - name: Run Node tests
        run: npm run test:ts

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python dependencies
        run: pip install -r relay/requirements.txt pytest pytest-asyncio httpx ruff

      - name: Lint Python
        run: ruff check relay/ tests/

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Python tests
        run: npm run test:py
