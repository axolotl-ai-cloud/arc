name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version $VERSION"
          # Update version in all publishable packages
          for pkg in packages/protocol packages/cli packages/adapter-hermes packages/adapter-deepagent packages/adapter-openclaw; do
            cd "$pkg"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd -
          done

      - name: Publish @axolotlai/arc-protocol
        run: npm publish --workspace=packages/protocol --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @axolotlai/arc-cli
        run: npm publish --workspace=packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @axolotlai/arc-adapter-hermes
        run: npm publish --workspace=packages/adapter-hermes --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # TODO: uncomment when adapters are ready
